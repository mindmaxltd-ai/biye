<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BIYE — Compatibility Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#E2136E;--pink-dark:#C20F5E;--pink-light:#FF4D94;
  --purple:#6A2DA8;--purple-light:#9C5FE0;--purple-dark:#4A1F78;
  --blue:#1565C0;--blue-light:#3B9CE8;
  --teal:#00A99D;--teal-light:#3FD6C4;
  --gold:#D4AF37;--gold-light:#F0D878;
  --green:#00A651;--green-dark:#157A3E;--green-light:#26A65B;
  --orange:#C2570A;--orange-light:#FB923C;
  --grey:#8A8A8A;
  --crimson:#B91C3C;
  --brand-grad:linear-gradient(120deg,var(--pink) 0%,var(--purple) 52%,var(--blue) 100%);
  --bg:#FAFAFC;--card:#FFFFFF;
  --border:rgba(20,20,20,.08);--border2:rgba(20,20,20,.14);
  --ink:#1A1A1A;--ink-soft:rgba(20,20,20,.55);
  --shadow:0 4px 18px -6px rgba(106,45,168,.14);
  --ok:#00A651;--bad:#C2185B;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Hind Siliguri','Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:24px}
html[lang="en"] body{font-family:'Inter','Hind Siliguri',sans-serif}
.grad-text{background:var(--brand-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
button{font-family:inherit}
.wrap{max-width:680px;margin:0 auto}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:.7rem;padding:.9rem 1rem .5rem}
.tn-logo{display:flex;align-items:center;gap:.5rem}
.brand-badge{width:30px;height:30px;border-radius:50%;object-fit:cover;box-shadow:0 0 0 2px #fff,0 0 0 3px var(--gold)}
.tn-logo-text{font-family:'Inter',sans-serif;font-weight:800;font-size:.88rem;color:var(--ink)}
.langpill{background:#fff;border:1.5px solid var(--border2);color:var(--ink);font-size:.7rem;font-weight:700;padding:.38rem .75rem;border-radius:50px;cursor:pointer}
.back-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.back-btn svg{width:16px;height:16px;stroke:var(--ink)}

.hero{padding:.6rem 1rem 1.2rem;text-align:center}
.hero-photo{width:88px;height:88px;border-radius:24px;margin:0 auto .7rem;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Inter',sans-serif;font-weight:800;font-size:1.9rem;position:relative;box-shadow:0 10px 22px -10px rgba(20,20,20,.4)}
.hero-verified{position:absolute;bottom:-6px;right:-6px;width:26px;height:26px;border-radius:50%;background:var(--ok);border:3px solid #fff;display:flex;align-items:center;justify-content:center}
.hero-verified svg{width:12px;height:12px;stroke:#fff;stroke-width:3}
.hero-name{font-size:1.15rem;font-weight:800}
.hero-meta{font-size:.8rem;color:var(--ink-soft);margin-top:.15rem}

.score-ring-wrap{width:150px;height:150px;margin:1.1rem auto .5rem;position:relative}
.score-ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.sr-track{fill:none;stroke:var(--border);stroke-width:8}
.sr-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.1s cubic-bezier(.2,.8,.2,1)}
.score-ring-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-family:'Inter',sans-serif;font-weight:800;font-size:2.1rem}
.score-band{font-size:.78rem;font-weight:700;margin-top:.15rem}

.section{padding:.8rem 1rem}
.section-title{font-size:.95rem;font-weight:800;margin-bottom:.7rem}

.notpassed-card{background:#fff;border:1.5px solid rgba(194,24,91,.3);border-radius:16px;padding:1.1rem;margin:.5rem 1rem;text-align:center}
.notpassed-card .icon{font-size:1.8rem;margin-bottom:.5rem}
.notpassed-reason{display:inline-block;background:rgba(194,24,91,.08);color:var(--bad);font-size:.74rem;font-weight:700;padding:.3rem .7rem;border-radius:50px;margin:.2rem}

.dcard{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:1rem 1.05rem;margin-bottom:.8rem}

.gate-row{display:flex;align-items:center;gap:.6rem;padding:.4rem 0;font-size:.8rem}
.gate-icon{width:20px;height:20px;border-radius:50%;background:var(--ok);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gate-icon svg{width:11px;height:11px;stroke:#fff;stroke-width:3}

.cat-block{margin-bottom:.9rem}
.cat-block:last-child{margin-bottom:0}
.cat-head-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.cat-name{font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:.4rem}
.cat-dot{width:9px;height:9px;border-radius:50%}
.cat-pct{font-family:'Inter',sans-serif;font-weight:800;font-size:.82rem}
.cat-weight{font-size:.64rem;color:var(--ink-soft);font-weight:600}
.cat-bar-track{height:7px;border-radius:4px;background:var(--border);overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px}
.cat-toggle{font-size:.66rem;color:var(--purple);font-weight:700;cursor:pointer;margin-top:.35rem}
.cat-detail{display:none;margin-top:.5rem;padding:.6rem .7rem;background:rgba(20,20,20,.02);border-radius:10px}
.cat-detail.open{display:block}
.metric-row{display:flex;justify-content:space-between;font-size:.72rem;padding:.2rem 0;color:var(--ink-soft)}
.metric-row b{color:var(--ink);font-weight:600}
.metric-sim{font-family:'Inter',sans-serif;font-weight:700}

.ctaband{margin:.5rem 1rem 1rem;padding:1.2rem;background:var(--brand-grad);border-radius:20px;border:2px solid var(--gold);text-align:center}
.ctaband h2{color:#fff;font-size:1.05rem;font-weight:800;margin-bottom:.3rem}
.ctaband p{color:rgba(255,255,255,.85);font-size:.78rem;margin-bottom:.9rem}
.cta-row{display:flex;gap:.6rem}
.cta-btn{flex:1;padding:.75rem .5rem;border-radius:50px;font-weight:700;font-size:.82rem;border:none;cursor:pointer}
.cta-btn.primary{background:var(--gold);color:#3a2a00}
.cta-btn.ghost{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.4)}

.consent-note{display:flex;gap:.5rem;align-items:flex-start;font-size:.68rem;color:var(--ink-soft);padding:0 1rem;line-height:1.6}
</style>
</head>

<script src="metrics-config.js"></script>
<script src="mock-data.js"></script>
<script src="scoring.js"></script>
<script>
var lang = 'en';
var result = null;
var candidate = null;

function initials(name){
  var parts = name.trim().split(' ');
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}
function photoGradient(seed){
  var grads = [
    'linear-gradient(150deg,#F06292,#C2185B)','linear-gradient(150deg,var(--purple-light),var(--purple))',
    'linear-gradient(150deg,var(--blue-light),var(--blue))','linear-gradient(150deg,var(--teal-light),var(--teal))',
    'linear-gradient(150deg,var(--orange-light),var(--orange))'
  ];
  return grads[seed.charCodeAt(seed.length-1) % grads.length];
}
function colorVar(c){ return 'var(--'+c+')'; }
function getParam(name){
  var m = new RegExp('[?&]'+name+'=([^&]*)').exec(location.search);
  return m ? decodeURIComponent(m[1]) : null;
}

function loadMatch(){
  var id = getParam('id');
  var user = (typeof MOCK_CURRENT_USER !== 'undefined') ? MOCK_CURRENT_USER : null;
  var candidates = (typeof MOCK_PROFILES !== 'undefined') ? MOCK_PROFILES : [];
  candidate = candidates.find(function(c){ return c.id === id; }) || candidates[0];
  result = BiyeScoring.computeMatch(user, candidate);
}

function render(){
  var wrap = document.getElementById('content');
  wrap.innerHTML = '';

  var hero = document.createElement('div');
  hero.className = 'hero';
  hero.innerHTML =
    '<div class="hero-photo" style="background:'+photoGradient(candidate.id)+'">'+initials(candidate.name)+
      (candidate.verified ? '<span class="hero-verified"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>':'')+
    '</div>'+
    '<div class="hero-name">'+candidate.name+'</div>'+
    '<div class="hero-meta">'+candidate.age+' &middot; '+candidate.city+' &middot; '+(lang==='bn'?'KYC লেভেল ':'KYC level ')+candidate.kycLevel+'/7</div>';
  wrap.appendChild(hero);

  if(!result.passed){
    renderNotPassed(wrap);
    return;
  }

  // Score ring
  var ringWrap = document.createElement('div');
  var circumference = 2 * Math.PI * 66;
  var offset = circumference - (circumference * result.score / 100);
  ringWrap.innerHTML =
    '<div class="score-ring-wrap">'+
      '<svg viewBox="0 0 150 150">'+
        '<defs><linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">'+
          '<stop offset="0%" stop-color="#E2136E"/><stop offset="52%" stop-color="#6A2DA8"/><stop offset="100%" stop-color="#1565C0"/>'+
        '</linearGradient></defs>'+
        '<circle class="sr-track" cx="75" cy="75" r="66"/>'+
        '<circle class="sr-fill" cx="75" cy="75" r="66" stroke="url(#scoreGrad)" stroke-dasharray="'+circumference+'" stroke-dashoffset="'+circumference+'" id="srFill"/>'+
      '</svg>'+
      '<div class="score-ring-txt"><span class="score-num grad-text">'+result.score+'%</span>'+
        '<span class="score-band" style="color:'+colorVar(result.band.color)+'">'+(lang==='bn'?result.band.bn:result.band.en)+'</span></div>'+
    '</div>';
  wrap.appendChild(ringWrap);
  setTimeout(function(){ var f=document.getElementById('srFill'); if(f) f.style.strokeDashoffset = offset; }, 150);

  // Rule gates passed
  var gateSection = document.createElement('div');
  gateSection.className = 'section';
  gateSection.innerHTML = '<p class="section-title" data-bn="যাচাই করা শর্ত" data-en="Verified conditions">Verified conditions</p>';
  var gateCard = document.createElement('div');
  gateCard.className = 'dcard';
  BiyeScoring.RULE_GATES.forEach(function(g){
    var row = document.createElement('div');
    row.className = 'gate-row';
    row.innerHTML = '<span class="gate-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span><span>'+(lang==='bn'?g.labelBn:g.labelEn)+'</span>';
    gateCard.appendChild(row);
  });
  gateSection.appendChild(gateCard);
  wrap.appendChild(gateSection);

  // Category breakdown
  var catSection = document.createElement('div');
  catSection.className = 'section';
  catSection.innerHTML = '<p class="section-title" data-bn="কেন এই স্কোর — ক্যাটাগরি অনুযায়ী" data-en="Why this score — by category">Why this score — by category</p>';
  var catCard = document.createElement('div');
  catCard.className = 'dcard';
  result.breakdown.forEach(function(b, idx){
    var block = document.createElement('div');
    block.className = 'cat-block';
    var detailId = 'catdetail-' + idx;
    var topHtml = b.topMetrics.map(function(m){
      return '<div class="metric-row"><b>'+(lang==='bn'?m.bn:m.en)+'</b><span class="metric-sim" style="color:'+(m.similarity>=70?'var(--ok)':m.similarity>=40?'var(--gold)':'var(--bad)')+'">'+m.similarity+'%</span></div>';
    }).join('');
    var weakHtml = b.weakMetrics.map(function(m){
      return '<div class="metric-row"><b>'+(lang==='bn'?m.bn:m.en)+'</b><span class="metric-sim" style="color:'+(m.similarity>=70?'var(--ok)':m.similarity>=40?'var(--gold)':'var(--bad)')+'">'+m.similarity+'%</span></div>';
    }).join('');
    block.innerHTML =
      '<div class="cat-head-row"><span class="cat-name"><span class="cat-dot" style="background:'+colorVar(b.color)+'"></span>'+(lang==='bn'?b.bn:b.en)+' <span class="cat-weight">('+b.weight+'%'+(lang==='bn'?' ওয়েট':' weight')+')</span></span><span class="cat-pct" style="color:'+colorVar(b.color)+'">'+b.score+'%</span></div>'+
      '<div class="cat-bar-track"><div class="cat-bar-fill" style="width:'+b.score+'%;background:'+colorVar(b.color)+'"></div></div>'+
      '<div class="cat-toggle" data-target="'+detailId+'">'+(lang==='bn'?'বিস্তারিত দেখুন ▾':'See details ▾')+'</div>'+
      '<div class="cat-detail" id="'+detailId+'">'+
        (topHtml ? '<div style="font-size:.68rem;font-weight:700;color:var(--ok);margin-bottom:.2rem">'+(lang==='bn'?'সবচেয়ে বেশি মিল':'Best matches')+'</div>'+topHtml : '')+
        (weakHtml ? '<div style="font-size:.68rem;font-weight:700;color:var(--bad);margin:.4rem 0 .2rem">'+(lang==='bn'?'সবচেয়ে কম মিল':'Weakest fit')+'</div>'+weakHtml : '')+
        '<div style="font-size:.62rem;color:var(--ink-soft);margin-top:.4rem">'+b.coveredMetrics+'/'+b.totalMetrics+' '+(lang==='bn'?'মেট্রিক্স তুলনা করা হয়েছে':'metrics compared')+'</div>'+
      '</div>';
    catCard.appendChild(block);
  });
  catSection.appendChild(catCard);
  wrap.appendChild(catSection);
  catCard.querySelectorAll('.cat-toggle').forEach(function(t){
    t.addEventListener('click', function(){
      var el = document.getElementById(t.getAttribute('data-target'));
      el.classList.toggle('open');
      t.textContent = el.classList.contains('open') ? (lang==='bn'?'লুকান ▴':'Hide ▴') : (lang==='bn'?'বিস্তারিত দেখুন ▾':'See details ▾');
    });
  });

  // CTA
  var cta = document.createElement('div');
  cta.className = 'ctaband';
  cta.innerHTML =
    '<h2 data-bn="আগ্রহী?" data-en="Interested?">Interested?</h2>'+
    '<p data-bn="সম্মতি দিলে একটা নিরাপদ, ব্লকচেইনে লগ হওয়া চ্যাট শুরু হবে।" data-en="Give consent to start a secure chat, logged on the blockchain.">Give consent to start a secure chat, logged on the blockchain.</p>'+
    '<div class="cta-row">'+
      '<button class="cta-btn primary" data-bn="সম্মতি দিন ও চ্যাট করুন" data-en="Consent & chat">Consent & chat</button>'+
      '<button class="cta-btn ghost" onclick="location.href=\'document-viewer.html\'" data-bn="ডকুমেন্ট দেখুন" data-en="View documents">View documents</button>'+
    '</div>';
  wrap.appendChild(cta);

  var note = document.createElement('p');
  note.className = 'consent-note';
  note.innerHTML = '🔒 <span data-bn="\'সম্মতি দিন ও চ্যাট করুন\'-এ ক্লিক করলে একটা কনসেন্ট রেকর্ড ব্লকচেইন লেজারে লেখা হবে — উভয় পক্ষের জন্য জবাবদিহিতার প্রমাণ হিসেবে।" data-en="Clicking Consent & chat writes a consent record to the blockchain ledger — proof of accountability for both sides.">Clicking Consent & chat writes a consent record to the blockchain ledger — proof of accountability for both sides.</span>';
  wrap.appendChild(note);
}

function renderNotPassed(wrap){
  var card = document.createElement('div');
  card.className = 'notpassed-card';
  var reasonsHtml = result.ruleFailures.map(function(f){
    return '<span class="notpassed-reason">'+(lang==='bn'?f.labelBn:f.labelEn)+'</span>';
  }).join('');
  card.innerHTML =
    '<div class="icon">🚫</div>'+
    '<div style="font-weight:800;font-size:.95rem;margin-bottom:.4rem" data-bn="এই প্রোফাইলটি সামঞ্জস্যপূর্ণ নয়" data-en="This profile is not compatible">This profile is not compatible</div>'+
    '<div style="font-size:.78rem;color:var(--ink-soft);margin-bottom:.6rem" data-bn="Rule Engine নিচের শর্তগুলোতে পাস করেনি:" data-en="The Rule Engine did not pass on:">The Rule Engine did not pass on:</div>'+
    reasonsHtml;
  wrap.appendChild(card);
}

(function(){
  function detectLang(){
    var langs=navigator.languages||[navigator.language||''];
    for(var i=0;i<langs.length;i++){ if(String(langs[i]).toLowerCase().indexOf('bn')===0) return 'bn'; }
    return 'en';
  }
  function applyLang(l){
    lang = l;
    document.documentElement.setAttribute('lang', l);
    var pill = document.getElementById('langPill');
    if(pill) pill.textContent = l==='bn'?'EN':'বাং';
    render();
  }
  document.addEventListener('DOMContentLoaded', function(){
    loadMatch();
    applyLang(detectLang());
    document.getElementById('langPill').addEventListener('click', function(){ applyLang(lang==='bn'?'en':'bn'); });
  });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BIYE — Matches</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#E2136E;--pink-dark:#C20F5E;--pink-light:#FF4D94;
  --purple:#6A2DA8;--purple-light:#9C5FE0;--purple-dark:#4A1F78;
  --blue:#1565C0;--blue-light:#3B9CE8;
  --teal:#00A99D;--teal-light:#3FD6C4;
  --gold:#D4AF37;--gold-light:#F0D878;
  --green:#00A651;--green-dark:#157A3E;--green-light:#26A65B;
  --orange:#C2570A;--orange-light:#FB923C;
  --grey:#8A8A8A;
  --crimson:#B91C3C;
  --brand-grad:linear-gradient(120deg,var(--pink) 0%,var(--purple) 52%,var(--blue) 100%);
  --bg:#FAFAFC;--card:#FFFFFF;
  --border:rgba(20,20,20,.08);--border2:rgba(20,20,20,.14);
  --ink:#1A1A1A;--ink-soft:rgba(20,20,20,.55);
  --shadow:0 4px 18px -6px rgba(106,45,168,.14);
  --ok:#00A651;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Hind Siliguri','Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:78px}
html[lang="en"] body{font-family:'Inter','Hind Siliguri',sans-serif}
.grad-text{background:var(--brand-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
button{font-family:inherit}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:.7rem;max-width:720px;margin:0 auto;padding:.9rem 1rem .5rem}
.tn-logo{display:flex;align-items:center;gap:.5rem}
.brand-badge{width:32px;height:32px;border-radius:50%;object-fit:cover;box-shadow:0 0 0 2px #fff,0 0 0 3px var(--gold)}
.tn-logo-text{font-family:'Inter',sans-serif;font-weight:800;font-size:.9rem;color:var(--ink)}
.langpill{background:#fff;border:1.5px solid var(--border2);color:var(--ink);font-size:.7rem;font-weight:700;padding:.38rem .75rem;border-radius:50px;cursor:pointer}
.back-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.back-btn svg{width:16px;height:16px;stroke:var(--ink)}

.summary-bar{max-width:720px;margin:0 auto;padding:.2rem 1rem .8rem}
.summary-title{font-size:1.05rem;font-weight:800;margin-bottom:.2rem}
.summary-sub{font-size:.76rem;color:var(--ink-soft)}

.filter-row{display:flex;gap:.5rem;overflow-x:auto;padding:0 1rem .8rem;max-width:720px;margin:0 auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex:0 0 auto;padding:.42rem .85rem;border-radius:50px;border:1.5px solid var(--border2);background:#fff;font-size:.72rem;font-weight:700;color:var(--ink-soft);cursor:pointer;white-space:nowrap}
.filter-chip.active{border-color:transparent;background:var(--brand-grad);color:#fff}

.feed{max-width:720px;margin:0 auto;padding:0 1rem 1rem;display:flex;flex-direction:column;gap:.8rem}

.match-row{display:flex;gap:.85rem;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:.8rem;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s}
.match-row:hover{transform:translateY(-2px)}
.mr-photo{width:64px;height:64px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Inter',sans-serif;font-weight:800;font-size:1.2rem;position:relative}
.mr-verified{position:absolute;bottom:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--ok);border:2px solid #fff;display:flex;align-items:center;justify-content:center}
.mr-verified svg{width:9px;height:9px;stroke:#fff;stroke-width:3}
.mr-body{flex:1;min-width:0}
.mr-top{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.mr-name{font-size:.92rem;font-weight:700}
.mr-meta{font-size:.72rem;color:var(--ink-soft);margin-top:.1rem}
.mr-score-badge{font-family:'Inter',sans-serif;font-weight:800;font-size:.82rem;padding:.25rem .55rem;border-radius:50px;color:#fff;flex-shrink:0}
.mr-band{font-size:.66rem;font-weight:700;margin-top:.35rem}
.mr-bars{display:flex;gap:.3rem;margin-top:.5rem}
.mr-bar{flex:1;height:5px;border-radius:3px;background:var(--border)}
.mr-bar-fill{height:100%;border-radius:3px}

.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--ink-soft)}

.excluded-toggle{text-align:center;font-size:.76rem;color:var(--purple);font-weight:700;cursor:pointer;padding:.6rem 0 1rem}
.excluded-row{display:flex;gap:.7rem;align-items:center;background:rgba(20,20,20,.02);border:1px dashed var(--border2);border-radius:14px;padding:.65rem .8rem;opacity:.75}
.excluded-row .mr-photo{filter:grayscale(1)}
.excluded-reason{font-size:.68rem;color:var(--grey);margin-top:.25rem}

.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:space-around;align-items:center;background:#fff;border-top:1px solid var(--border);padding:.55rem .4rem calc(.55rem + env(safe-area-inset-bottom));box-shadow:0 -4px 16px -8px rgba(20,20,20,.12)}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:.2rem;background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:.6rem;padding:.2rem .5rem;font-family:inherit}
.tab-item svg{width:20px;height:20px;stroke:var(--ink-soft)}
.tab-item.active{color:var(--purple)}
.tab-item.active svg{stroke:var(--purple)}
</style>
</head>

<script>
var lang = 'en';
var ranked = [];
var currentFilter = 'all';
var showExcluded = false;

var BAND_COLORS = { pink: 'var(--pink)', purple: 'var(--purple)', blue: 'var(--blue)', teal: 'var(--teal)', grey: 'var(--grey)' };

function initials(name){
  var parts = name.trim().split(' ');
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}

function photoGradient(seed){
  var grads = [
    'linear-gradient(150deg,#F06292,#C2185B)','linear-gradient(150deg,var(--purple-light),var(--purple))',
    'linear-gradient(150deg,var(--blue-light),var(--blue))','linear-gradient(150deg,var(--teal-light),var(--teal))',
    'linear-gradient(150deg,var(--orange-light),var(--orange))'
  ];
  var idx = seed.charCodeAt(seed.length-1) % grads.length;
  return grads[idx];
}

function renderFilters(){
  var bands = [
    {id:'all', bn:'সব', en:'All'},
    {id:'Soul Match', bn:'সোলমেট', en:'Soul Match'},
    {id:'Excellent Match', bn:'চমৎকার', en:'Excellent'},
    {id:'Strong Match', bn:'শক্তিশালী', en:'Strong'},
    {id:'Potential Match', bn:'সম্ভাব্য', en:'Potential'}
  ];
  var row = document.getElementById('filterRow');
  row.innerHTML = '';
  bands.forEach(function(b){
    var chip = document.createElement('button');
    chip.className = 'filter-chip' + (currentFilter===b.id ? ' active' : '');
    chip.textContent = lang==='bn' ? b.bn : b.en;
    chip.onclick = function(){ currentFilter = b.id; renderFilters(); renderFeed(); };
    row.appendChild(chip);
  });
}

function colorVar(c){ return 'var(--'+c+')'; }

function renderFeed(){
  var feed = document.getElementById('feed');
  feed.innerHTML = '';
  var list = ranked.filter(function(r){ return currentFilter==='all' || (r.band && r.band.en === currentFilter); });

  if(list.length === 0){
    feed.innerHTML = '<div class="empty-state">'+(lang==='bn'?'এই ফিল্টারে কোনো ম্যাচ নেই।':'No matches in this filter.')+'</div>';
    return;
  }

  list.forEach(function(r){
    var p = r.profile;
    var row = document.createElement('div');
    row.className = 'match-row';
    row.onclick = function(){ location.href = 'match-detail.html?id=' + p.id; };
    var topCats = r.breakdown.slice(0,4);
    var barsHtml = topCats.map(function(b){
      return '<div class="mr-bar"><div class="mr-bar-fill" style="width:'+b.score+'%;background:'+colorVar(b.color)+'"></div></div>';
    }).join('');
    row.innerHTML =
      '<div class="mr-photo" style="background:'+photoGradient(p.id)+'">'+initials(p.name)+
        (p.verified ? '<span class="mr-verified"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>' : '')+
      '</div>'+
      '<div class="mr-body">'+
        '<div class="mr-top"><span class="mr-name">'+p.name+'</span><span class="mr-score-badge" style="background:'+BAND_COLORS[r.band.color]+'">'+r.score+'%</span></div>'+
        '<div class="mr-meta">'+p.age+' &middot; '+p.city+'</div>'+
        '<div class="mr-band" style="color:'+BAND_COLORS[r.band.color]+'">'+(lang==='bn'?r.band.bn:r.band.en)+'</div>'+
        '<div class="mr-bars">'+barsHtml+'</div>'+
      '</div>';
    feed.appendChild(row);
  });
}

function renderExcluded(allResults){
  var excluded = allResults.filter(function(r){ return !r.passed; });
  var toggle = document.getElementById('excludedToggle');
  var wrap = document.getElementById('excludedFeed');
  toggle.textContent = (lang==='bn'
    ? (showExcluded ? '▲ বাদ পড়া প্রোফাইল লুকান' : '▼ '+excluded.length+' টা প্রোফাইল rule filter-এ বাদ পড়েছে — কেন দেখুন')
    : (showExcluded ? '▲ Hide excluded profiles' : '▼ '+excluded.length+' profiles excluded by rule filters — see why'));
  toggle.onclick = function(){ showExcluded = !showExcluded; wrap.style.display = showExcluded?'flex':'none'; renderExcluded(allResults); };
  wrap.style.display = showExcluded ? 'flex' : 'none';
  wrap.innerHTML = '';
  if(!showExcluded) return;
  excluded.forEach(function(r){
    var p = r.profile;
    var row = document.createElement('div');
    row.className = 'excluded-row match-row';
    row.style.cursor = 'default';
    var reasons = r.ruleFailures.map(function(f){ return lang==='bn'?f.labelBn:f.labelEn; }).join(', ');
    row.innerHTML =
      '<div class="mr-photo" style="background:'+photoGradient(p.id)+'">'+initials(p.name)+'</div>'+
      '<div class="mr-body">'+
        '<div class="mr-name">'+p.name+'</div>'+
        '<div class="mr-meta">'+p.age+' &middot; '+p.city+'</div>'+
        '<div class="excluded-reason">'+(lang==='bn'?'বাদ পড়ার কারণ: ':'Excluded because: ')+reasons+'</div>'+
      '</div>';
    wrap.appendChild(row);
  });
}

var allResults = [];

function computeMatches(){
  var user = (typeof MOCK_CURRENT_USER !== 'undefined') ? MOCK_CURRENT_USER : null;
  var candidates = (typeof MOCK_PROFILES !== 'undefined') ? MOCK_PROFILES : [];
  allResults = BiyeScoring.rankMatches(user, candidates, { includeFailed: true });
  ranked = allResults.filter(function(r){ return r.passed; });
}

function updateSummary(){
  document.getElementById('summaryTitle').textContent = lang==='bn'
    ? ranked.length + ' টা ম্যাচ পাওয়া গেছে'
    : ranked.length + ' matches found';
  document.getElementById('summarySub').textContent = lang==='bn'
    ? 'Rule Engine (১০%) দিয়ে বাছাই করা, AI Engine (৯০%) দিয়ে র‍্যাংক করা — সর্বোচ্চ সামঞ্জস্য আগে।'
    : 'Filtered by the Rule Engine (10%), ranked by the AI Engine (90%) — highest compatibility first.';
}

(function(){
  function detectLang(){
    var langs=navigator.languages||[navigator.language||''];
    for(var i=0;i<langs.length;i++){ if(String(langs[i]).toLowerCase().indexOf('bn')===0) return 'bn'; }
    return 'en';
  }
  function applyLang(l){
    lang = l;
    document.documentElement.setAttribute('lang', l);
    document.querySelectorAll('[data-bn]').forEach(function(el){
      var t = l==='bn'?el.getAttribute('data-bn'):el.getAttribute('data-en');
      if(t!==null) el.textContent = t;
    });
    var pill = document.getElementById('langPill');
    if(pill) pill.textContent = l==='bn'?'EN':'বাং';
    updateSummary();
    renderFilters();
    renderFeed();
    renderExcluded(allResults);
  }
  document.addEventListener('DOMContentLoaded', function(){
    computeMatches();
    applyLang(detectLang());
    document.getElementById('langPill').addEventListener('click', function(){ applyLang(lang==='bn'?'en':'bn'); });
  });
})();
</script>
</body>
</html>
